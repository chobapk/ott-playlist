<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>OTT Request</title>
</head>
<body style="font-family:sans-serif; text-align:center; margin-top:50px;">

  <h2>ขอใช้งาน Playlist</h2>
  <button onclick="requestToken()">ขอ Token</button>

  <p id="result" style="margin-top:20px;"></p>

  <script>
    async function requestToken() {
      const res = await fetch('/api/request');
      const data = await res.json();

      document.getElementById('result').innerHTML =
        "Token ของคุณ:<br><b>" + data.token + "</b><br><br>" +
        "ส่ง Token นี้ให้แอดมินเพื่ออนุมัติ";
    }
  </script>

</body>
</html>
